# Console over USB CDC ACM
CONFIG_LOG=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Tracker Display"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0003

# Display
CONFIG_DISPLAY=y
CONFIG_SPI=y
CONFIG_GPIO=y

# Character framebuffer — simple text rendering without a full GUI stack
CONFIG_CHARACTER_FRAMEBUFFER=y

# CFB allocates its buffer with k_malloc
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Power domains (3V3 + 5V rails)
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_PM_DEVICE_POWER_DOMAIN=y
CONFIG_TIMEOUT_64BIT=y
CONFIG_POWER_DOMAIN=y
CONFIG_POWER_DOMAIN_GPIO_INIT_PRIORITY=1

# Console
CONFIG_LOG=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Display
CONFIG_DISPLAY=y
CONFIG_SPI=y
CONFIG_GPIO=y

# Character framebuffer — simple text rendering without a full GUI stack
CONFIG_CHARACTER_FRAMEBUFFER=y

# CFB allocates its buffer with k_malloc
CONFIG_HEAP_MEM_POOL_SIZE=16384

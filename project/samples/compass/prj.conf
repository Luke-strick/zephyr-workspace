# Console
CONFIG_LOG=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Sensors
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_LSM6DSO=y
CONFIG_LIS3MDL=y
CONFIG_LIS3MDL_TRIGGER_NONE=y

# Float printing
CONFIG_CBPRINTF_FP_SUPPORT=y

# FPU (Cortex-M33)
CONFIG_FPU=y

# GPIO (for button)
CONFIG_GPIO=y
CONFIG_INPUT=y

# USB device stack
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Tracker Shell"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0001

# CDC ACM as console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Shell over USB serial
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Logging
CONFIG_LOG=y

# GPIO
CONFIG_GPIO=y
CONFIG_GPIO_SHELL=y

# I2C + shell
CONFIG_I2C=y
CONFIG_I2C_SHELL=y

# SPI + shell
CONFIG_SPI=y
CONFIG_SPI_SHELL=y

# Sensors
CONFIG_SENSOR=y
CONFIG_SENSOR_SHELL=y
CONFIG_LSM6DSO=y
CONFIG_LIS3MDL=y
CONFIG_LIS3MDL_TRIGGER_NONE=y

# Power domains (3V3 + 5V rails)
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_PM_DEVICE_POWER_DOMAIN=y
CONFIG_PM_DEVICE_SHELL=y
CONFIG_TIMEOUT_64BIT=y
CONFIG_POWER_DOMAIN=y
CONFIG_POWER_DOMAIN_GPIO_INIT_PRIORITY=15

# Device shell (list/inspect devices)
CONFIG_DEVICE_SHELL=y

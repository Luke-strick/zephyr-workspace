# Console
CONFIG_LOG=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# GPIO (card detect)
CONFIG_GPIO=y

# Disk / SD card
CONFIG_DISK_ACCESS=y
CONFIG_SDMMC_SUBSYS=y
CONFIG_SDMMC_STM32=y

# FAT filesystem (optional — for on-device access alongside USB)
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y

# USB mass storage — exposes the SD card over USB-C
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Tracker SD Card"
CONFIG_USB_DEVICE_VID=0x0483
CONFIG_USB_DEVICE_PID=0x0001
CONFIG_USB_MASS_STORAGE=y
CONFIG_MASS_STORAGE_DISK_NAME="SD"

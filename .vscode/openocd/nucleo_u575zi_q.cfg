# OpenOCD configuration for ST Nucleo U575ZI-Q (STM32U575xx)
# Interface: ST-Link v3 (on-board)
# Chip: STM32U575ZITxQ — same core as STM32U575RGT6

source [find interface/stlink-dap.cfg]

set WORKAREASIZE 0x8000

transport select "dapdirect_swd"

set CHIPNAME STM32U575ZITxQ
set BOARDNAME NUCLEO-U575ZI-Q

set ENABLE_LOW_POWER 1
set STOP_WATCHDOG 1
set CLOCK_FREQ 8000

reset_config srst_only srst_nogate connect_assert_srst
set CONNECT_UNDER_RESET 1
set CORE_RESET 0

set AP_NUM 0
set GDB_PORT 3333

source [find target/stm32u5x.cfg]

$_TARGETNAME configure -event gdb-attach {
    echo "Debugger attaching: halting execution"
    reset halt
    gdb_breakpoint_override hard
}

$_TARGETNAME configure -event gdb-detach {
    echo "Debugger detaching: resuming execution"
    resume
}
